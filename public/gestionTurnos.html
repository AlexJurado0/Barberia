<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="body-cliente" s>

  <!-- Barra superior y Sidebar -->
  <div class="barra-superior">
    <button class="menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
    <h2 class="inicio" onclick="window.location.href = '/panelAdmin';">💈 Peluqueria</h2>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Menú</h2>
      <button class="close-sidebar" id="close-sidebar"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="sidebar-body">
      <button class="sidebar-btn" id="gestion-de-turnos"><i class="bi bi-calendar-check"></i> Gestión de Turnos</button>
      <button class="sidebar-btn" id="gestion-de-servicios"><i class="bi bi-scissors"></i> Gestión de Servicios</button>
    </div>
    <div class="sidebar-footer">
      <button class="salir" id="salir"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </div>
  </div>

  <div class="centra-elemento" style="margin-top: 100px;">
    <div class="divTurnos" >
      <h2>Gestion de Turnos</h2>
      <label for="date">Día</label>
      <input type="date" id="date" required>
      <label for="hora-inicio">Inicio</label>
      <input type="text" id="hora-inicio" placeholder="Hora de inicio" required>
      <label for="hora-fin">Fin</label>
      <input type="text" id="hora-fin" placeholder="Hora de finalizacion" required>

      <!-- <label for="hora">Hora</label> -->
      <!-- <select name="hora" id="hora">
      </select> -->
      <button class="btn-solicitar-turno" style="margin: 10px 0px 40px 0px;" id="guardar-horarios">Guardar</button>

    </div>

    <div>
      <h2>Horarios disponibles</h2>
    </div>
    <div class="tabla-turnos" id="tabla-turnos">
    
    </div>  

  </div>

  
  <script src="/js/gestionTurnos.js"></script>
  <script src="/js/enrutador.js"></script>
</body>

</html>
