
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Peluquería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body class="body-Admin">

<!-- Barra superior y Sidebar -->
  <div class="barra-superior">
    <button class="menu-toggle" id="menu-toggle"><i class="bi bi-list"></i></button>
    <h2 class="inicio" onclick="window.location.href = '/panelAdmin';">💈 Peluqueria</h2>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Menú</h2>
      <button class="close-sidebar" id="close-sidebar"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="sidebar-body">
      <button class="sidebar-btn" id="gestion-de-turnos"><i class="bi bi-calendar-check"></i> Gestión de Turnos</button> 
      <button class="sidebar-btn" id="gestion-de-servicios"><i class="bi bi-scissors"></i> Gestión de Servicios</button> 
    </div>
    <div class="sidebar-footer">
      <button class="salir" id="salir"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </div>
  </div>
  <!-- Filtrar Estado -->
  <div class="filtrar-estados">
    <button id="todos">Todos</button>
    <button id="confirmados">Confirmados</button>
    <button id="pendientes">Pendientes</button>
    <button id="cancelados">Cancelados</button>
  </div>
  
  <input type="date" id="filtrar-fecha" class="filtro-fecha">
  <button id="fecha" class="filtrar-fecha">Filtrar</button>
  <!-- Turnos -->
  <div id="container-turnos">
    
  </div>
  <script src="/js/panelAdmin.js"></script>
  <script src="/js/enrutador.js"></script>
</body>
</html>
