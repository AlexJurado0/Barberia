
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Peluquería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/style.css">
</head>

<body class="body-Admin">

<style>
  input[type="date"] {
  background: #343a40;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 8px 15px;
  cursor: pointer;
  outline: none;
  margin-left: 15px;
}
/* Icono del calendario (Chrome / Edge) */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
  }

</style>


<!-- Barra superior -->
  <div class="barra-superior">
    <h2>💈 Peluqueria</h2>
    <button class="salir" id="salir">salir</button>
  </div>
  <!-- Filtrar Estado -->
  <div class="filtrar-estados">
    <button id="todos">Todos</button>
    <button id="confirmados">Confirmados</button>
    <button id="pendientes">Pendientes</button>
    <button id="cancelados">Cancelados</button>
  </div>

  <input type="date">
  <!-- Turnos -->
  <div id="container-turnos">
    
  </div>
  <script src="js/panelAdmin.js"></script>
</body>
</html>
