
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Peluquería</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="body-Admin">
<!-- Barra superior -->
  <div class="barra-superior">
    <h2>💈 Peluqueria</h2>
    <button class="salir">salir</button>
  </div>
  <!-- Filtrar Estado -->
  <div class="filtrar-estados">
    <button>Todos</button>
    <button>Confirmados</button>
    <button>Pendientes</button>
  </div>
  <!-- Turnos -->
  <div class="turnos">
    <div class="hora">11:00</div>
    <h3>Alex Jurado</h3>
    <p>Corte de pelo</p>
    <div class="estado pendiente">🟡 Pendiente</div>
    <div class="accion">
      <button class="confirmar">✔ Confirmar</button>
      <button class="cancelar">❌ Cancelar</button>
    </div>
    
  </div>

  <div class="turnos">
    <div class="hora">11:00</div>
    <h3>Alex Jurado</h3>
    <p>Corte de pelo</p>
    <div class="estado confirmado">🟢 Confirmado</div>
    <div class="accion">
      <button class="confirmar">✔ Confirmar</button>
      <button class="cancelar">❌ Cancelar</button>
    </div>
    
  </div>

  <div class="turnos">
    <div class="hora">11:00</div>
    <h3>Alex Jurado</h3>
    <p>Corte de pelo</p>
    <div class="estado cancelado">🔴 Cancelado</div>
    <div class="accion">
      <button class="confirmar">✔ Confirmar</button>
      <button class="cancelar">❌ Cancelar</button>
    </div>
    
  </div>

  <script src="script.js"></script>
</body>
</html>
