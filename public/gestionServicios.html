<!DOCTYPE html>
<html lang="en">

    </div>

    <div>
      <h2>Servicios disponibles</h2>
    </div>

    <div class="tabla-servicios" id="tabla-servicios">
      <h3 class="tabla-header">Servicio</h3>
      <h3 class="tabla-header">Precio</h3>
      <h3 class="tabla-header">Acción</h3>


    </div>
  </div>
