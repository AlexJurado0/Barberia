<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Peluquería</title>
  <!-- Bootstrap -->
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
</head>

<body class="tamaño color-text body-login" style="background-color: #212529; " >
<div class="centra-elemento " style="height: 100vh;" >
  <div class="login-style">
    <h1 class="centra-elemento" style="font-size: 40px">Iniciar session</h1>
      <form action="/panelAdmin" method="post"> 
        <div class="centra-elemento">
          <label for="user" class="label "> <i class="bi bi-person-fill "></i> Usuario</label>
          <input type="text" class="input-form" name="user" required style="margin-bottom: 10px; display: inline;">
        </div>
        <div class="centra-elemento">
          <label for="pass" class="label "><i class="bi bi-key-fill "></i> Contraseña</label>
          <input type="password" class=" input-form " name="pass" required style="margin-bottom: 10px;">
        </div>
        <div class="centra-elemento">
          <button type="submit" class="button">Ingresar</button>
        </div>
      </form>
  </div>
</div>
</body>
</html>
