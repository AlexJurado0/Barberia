<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<style>
  .body-cliente {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #212529;
  color: white;
}
  .divTurnos{
    height: auto;
    width: 400px;
    border-radius: 10px;
    background-color: #2c3034;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    gap: 10px;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    background-color: 000000;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
  }


  .divTurnos input, 
  .divTurnos select{
    border: none;
    font-size: 15px;
    height: 40px;
    width: 300px;
    padding: 0 10px;
    box-sizing: border-box;
  }


  .divTurnos label{
  font-size: 15px;
  align-self: flex-start;
  margin-left: 50px;
  margin-bottom: -5px;
  color: #ccc;
}
</style>

<body class="body-cliente">
  <div class="centra-elemento" style="height: 100vh;">
    <div class="divTurnos">
      <h2>Turnos disponibles</h2>
      <label for="date">Día</label>
      <input type="date" id="date" >
      <label for="hora">Hora</label>
      <select name="" id="hora">
        <option value="">09:00</option>
        <option value="">09:30</option>
        <option value="">10:00</option>
        <option value="">10:30</option>
        <option value="">11:00</option>
        <option value="">11:30</option>
        <option value="">12:00</option>
        <option value="">12:30</option>
      </select>
      <label for="nombre">Nombre y Apellido</label>
      <input type="text" id="nombre">
      <label for="servicio">Servicio</label>
      <select name="" id="servicio">
        <option value="">Corte de pelo (10000$)</option>
        <option value="">Corte de pelo y barba (12000$)</option>
        <option value="">Teñir el pelo (30000$)</option>
      </select>
      <p style="font-size: 14px; padding: 0px 0px 10px 25px; opacity: 70%;" class="centra-elemento">
        Aclaración Luego de solicitar el corte, comunicarse por WhatsApp con el responsable para abonar el servicio. Hacerlo con al menos 24 horasd e anticipación.
      </p>
    </div>
  </div>
  



  <a href="login.html"><img src="whatsapp (1).png" alt="" class="whatsApp"></a>
  </div>
</body>
</html>
